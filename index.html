    <script>
      // Prevent some libraries from trying to overwrite window.fetch
      // if it's already defined as a non-writable property.
      if (typeof window !== 'undefined' && 'fetch' in window) {
        const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (descriptor && !descriptor.writable && !descriptor.set) {
          console.warn('window.fetch is read-only. Guarding against overrides.');
          // We can't actually "fix" it if it's read-only, 
          // but we can try to intercept assignment via Proxy if needed,
          // though usually just ignoring the assignment is fine.
        }
      }
    </script>
